<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo Mobile Bank | Home</title>
    <link rel="shortcut icon" href="/assets/logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">   
    
    <style>
        *{
            font-family: "Outfit", sans-serif;
        }
    </style>

</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
         <section class="py-3 flex justify-between items-center  w-[95%] mx-auto ">
            <div class="left flex gap-2">
                <div class="logo w-[80px]"><img src="/assets/logo.png" alt=""></div>
                <div> <h1 class="text-2xl font-bold">$ <span id="blance">35000</span></h1>
                <p class="text-neutral/50">Available Blance</p></div>
            </div>
            <div class="logout-home"> <a class="btn btn-soft"href="index.html"><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a></div>
         </section>
    </header>

    <section class="w-[92%] mx-auto py-10 space-y-7 ">
        <h2 class="text-3xl font-bold">Welcome to Pay<span class="text-primary" >oo</span></h2>
        <p class="text-neutral/50">Enjoy easy and convenient financial service with us Cashout charge is low and</p>

        <div class="button grid grid-cols-3 gap-3">
            <button class="btn flex-col h-full py-5  btn-primary btn-soft">
                <img src="assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <button class="btn flex-col h-full py-5 btn-primary btn-soft">
                <img src="assets/opt-2.png" alt="">
                <p>Cashout</p>
            </button>
            <button class="btn flex-col h-full py-5 btn-primary btn-soft">
                <img src="assets/opt-3.png" alt="">
                <p>Get Bonus</p>
            </button>
            <button class="btn flex-col h-full py-5 btn-primary btn-soft">
                <img src="assets/opt-4.png" alt="">
                <p> Pay Bill </p>
            </button>
            <button class="btn flex-col h-full py-5 btn-primary btn-soft">
                <img src="assets/opt-5.png" alt="">
                <p>Transaction</p>
            </button>
            <button class="btn flex-col h-full py-5 btn-primary btn-soft">
                <img src="assets/opt-6.png" alt="">
                <p>Add Money</p>
            </button>
        </div>



    </section>

    <section id="cashout" class="w-[92%] mx-auto pt-7">
        <h2 class="text-xl font-bold">Cashout</h2>
         <div class="form py-7 ">
        <div class="card bg-base-100 w-full  shadow-xl  rounded-2xl">
        <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral text-[18px] font-medium">Agent Number</label>
          <input id="cashout-number" maxlength="11"minlenght="11" type="text" class="input bg-base-200 rounded-full w-full" placeholder="Enter Your 11 digit Number" /> 
          <br>
          <label class="label text-neutral text-[18px] font-medium">Amount</label>
          <input id="amount"  type="number" class="input bg-base-200 rounded-full w-full" placeholder="Enter Your Amount" /> 
          <br>
          <label class="label text-neutral font-medium text-[18px]">4 Digit Pin</label>
          <input id="cashout-password" maxlength="4" type="password" class="input bg-base-200 rounded-full w-full" placeholder="Password" />
          <br>
          
          <button id="withdraw-btn" class="btn btn-primary rounded-full">Withdraw  Money</button>
        </fieldset>
      </div>
    </div>
    </div>
    </section>
    <script src="script/machine.js"></script>
   <script src="script/cashouot.js"></script>
</body>

</html>
